<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Chatbot AI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <!-- TOP BAR -->
    <div class="topbar">
        <div>Chatbot AI</div>

        <!-- modalità Pirandello -->
        <select onchange="setPersona(this.value)">
            <option value="normale">Normale</option>
            <option value="pirandello">Pirandello</option>
        </select>
    </div>

    <!-- CHAT -->
    <div id="chat"></div>

    <!-- INPUT AREA -->
    <div class="input-area">

        <input
            id="input"
            type="text"
            placeholder="Scrivi un messaggio..."
            autocomplete="off"
        >

        <button onclick="sendMessage()">Invia</button>

    </div>

</div>

<!-- JS -->
<script src="app.js"></script>

</body>
</html>
